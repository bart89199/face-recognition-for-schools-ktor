<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Профиль</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link rel="preload" href="/profile/script.js" as="script">
    <style>
        :root { font-family: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif; color-scheme: light dark; }
        body { margin:0; background:#f5f7fb; color:#0f172a; }
        header { position:sticky; top:0; background:#1e293b; color:#f1f5f9; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:20px; }
        h1 { margin:0; font-size:1.1rem; }
        main { max-width:1100px; margin:22px auto 60px; padding:0 20px 40px; display:flex; flex-direction:column; gap:28px; }
        .grid { display:grid; gap:24px; grid-template-columns:360px 1fr; align-items:start; }
        @media (max-width:1000px){ .grid { grid-template-columns:1fr; } }
        .panel { background:#fff; padding:20px 22px 26px; border-radius:18px; box-shadow:0 4px 18px rgba(0,0,0,.05); }
        h2 { margin:0 0 14px; font-size:1rem; }
        form { display:flex; flex-direction:column; gap:14px; }
        label { font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; display:flex; flex-direction:column; gap:4px; color:#475569; }
        input[type=text], input[type=password], input[type=email] {
            border:1px solid #cbd5e1; border-radius:8px; padding:10px 12px; font:inherit; background:#fff;
        }
        input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.35); }
        button { font:inherit; border:none; cursor:pointer; border-radius:8px; padding:8px 14px; font-weight:600; background:#2563eb; color:#fff; display:inline-flex; align-items:center; gap:6px; line-height:1.1; }
        button.secondary { background:#475569; }
        button.danger { background:#dc2626; }
        button.outline { background:#fff; color:#1e293b; border:1px solid #cbd5e1; }
        button.outline:hover { background:#f1f5f9; }
        button:disabled { opacity:.55; cursor:not-allowed; }
        .error { background:#fee2e2; color:#991b1b; padding:10px 12px; border-radius:10px; font-size:.7rem; display:none; }
        .success { background:#dcfce7; color:#166534; padding:10px 12px; border-radius:10px; font-size:.7rem; display:none; }
        .error.show, .success.show { display:block; }
        table { width:100%; border-collapse:collapse; background:#fff; border-radius:16px; overflow:hidden; font-size:.75rem; }
        th, td { padding:8px 10px; border-bottom:1px solid #e2e8f0; text-align:left; vertical-align:top; }
        th { background:#f1f5f9; font-weight:600; font-size:.65rem; letter-spacing:.07em; text-transform:uppercase; }
        tbody tr:last-child td { border-bottom:none; }
        .muted { color:#64748b; font-size:.65rem; letter-spacing:.04em; }
        .sessions-actions { display:flex; gap:10px; flex-wrap:wrap; margin:0 0 12px; align-items:center; }
        .spinner { width:14px; height:14px; border:3px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        tr.current-session { background:#e0f2fe; outline:2px solid #2563eb; }
        tr.current-session td { border-bottom-color:#bfdbfe; }
        .current-badge {
            display:inline-block; margin-right:6px; padding:3px 7px 4px;
            background:#2563eb; color:#fff; font-size:.55rem; letter-spacing:.05em;
            border-radius:999px; font-weight:600;
        }

        .time-remaining { font-variant-numeric: tabular-nums; }
        .time-soon { color:#b45309; font-weight:600; }
        .time-very-soon { color:#dc2626; font-weight:700; }
        .time-expired { color:#dc2626; text-decoration:line-through; }

        .badge { display:inline-block; padding:3px 7px 4px; border-radius:999px; font-size:.55rem; letter-spacing:.04em; font-weight:600; }
        .badge-active { background:#059669; color:#fff; }
        .badge-inactive { background:#64748b; color:#fff; }

        select { font:inherit; font-size:.7rem; padding:6px 8px; border-radius:8px; border:1px solid #cbd5e1; background:#fff; }
        select:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.35); }

        .session-expire-banner {
            display:none; margin:0 0 14px; padding:10px 14px;
            border-radius:12px; background:#e0f2fe; color:#0c4a6e;
            font-size:.7rem; font-weight:500;
        }
        .session-expire-banner.show { display:block; }

        @media (prefers-color-scheme: dark) {
            body { background:#0f172a; color:#f1f5f9; }
            .panel { background:#1e293b; box-shadow:0 4px 22px rgba(0,0,0,.55); }
            input[type=text], input[type=password], input[type=email], select { background:#0f172a; border-color:#334155; color:#f1f5f9; }
            table, th, td { background:#1e293b; border-color:#334155; }
            th { background:#0f172a; }
            button.outline { background:#1e293b; color:#f1f5f9; border-color:#334155; }
            button.outline:hover { background:#334155; }
            .error { background:#7f1d1d; color:#fee2e2; }
            .success { background:#14532d; color:#dcfce7; }
            tr.current-session { background:#1e3a8a; }
            .session-expire-banner { background:#1e3a8a; color:#bfdbfe; }
        }
    </style>
</head>
<body>
<header>
    <h1>Профиль</h1>
    <div style="display:flex; gap:10px;">
        <button class="secondary outline" onclick="location.href='/'">Главная</button>
        <button class="danger" onclick="location.href='/logout'">Выйти</button>
    </div>
</header>
<main>
    <div id="err" class="error" role="alert" aria-live="assertive"></div>
    <div id="ok" class="success" role="status" aria-live="polite"></div>

    <div class="grid">
        <!-- Профиль -->
        <div class="panel">
            <h2>Данные профиля</h2>
            <form id="profileForm" novalidate>
                <label>
                    Имя
                    <input id="name" type="text" required placeholder="Ваше имя" autocomplete="name"/>
                </label>
                <label>
                    Email (нельзя изменить)
                    <input id="email" type="email" disabled autocomplete="email"/>
                </label>
                <label>
                    Новый пароль
                    <input id="password" type="password" placeholder="Оставьте пустым, чтобы не менять" autocomplete="new-password"/>
                </label>
                <div style="display:flex; gap:10px;">
                    <button type="submit" id="saveBtn">Сохранить</button>
                    <button type="button" class="secondary" id="resetBtn">Сброс</button>
                </div>
                <div class="muted">Пароль меняется только если поле заполнено.</div>
            </form>
        </div>

        <!-- Сессии -->
        <div class="panel">
            <h2 style="margin-top:0;">Сессии</h2>
            <div id="currentSessionExpire" class="session-expire-banner">
                Текущая сессия истекает через <span id="currentSessionRemaining">--:--</span>.
            </div>
            <div class="muted" style="margin:-6px 0 12px;">
                Можно завершить отдельную сессию или все сразу. Текущая подсвечена.
            </div>
            <div class="sessions-actions">
                <select id="sessionsFilter" title="Фильтр по активности">
                    <option value="active">Активные</option>
                    <option value="inactive">Неактивные</option>
                    <option value="all">Все</option>
                </select>
                <button type="button" id="reloadSessions" class="outline" title="Обновить">Обновить</button>
                <button type="button" id="deleteAllSessions" class="danger outline" title="Удалить все активные">Удалить все активные</button>
            </div>
            <table aria-describedby="sessionsCount">
                <thead>
                <tr>
                    <th>Вход</th>
                    <th>User-Agent</th>
                    <th>IP</th>
                    <th>Активна</th>
                    <th>Google</th>
                    <th>Осталось</th>
                    <th style="width:70px;">Действия</th>
                </tr>
                </thead>
                <tbody id="sessionsBody"></tbody>
            </table>
            <div class="muted" id="sessionsCount"></div>
        </div>
    </div>
</main>
<script src="/profile/script.js" defer></script>
</body>
</html>
