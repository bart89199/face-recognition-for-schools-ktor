<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Настройки</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link rel="preload" href="/settings/script.js" as="script">
    <style>
        :root { font-family: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif; color-scheme: light dark; }
        * { box-sizing: border-box; }
        body { margin:0; background:#0f172a; color:#f1f5f9; }
        header {
            position:sticky; top:0; background:#1e293b; padding:14px 22px;
            display:flex; align-items:center; justify-content:space-between; gap:18px; z-index:40;
            box-shadow:0 2px 6px rgba(0,0,0,.4);
        }
        h1 { margin:0; font-size:1.05rem; letter-spacing:.5px; }
        main { max-width:1100px; margin:24px auto 90px; padding:0 22px 60px; display:flex; flex-direction:column; gap:26px; }

        .card {
            background:#1e293b; border-radius:22px; padding:26px 28px 34px;
            box-shadow:0 4px 18px rgba(0,0,0,.55);
        }

        .controls { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin:0 0 18px; }
        button {
            font:inherit; cursor:pointer; border:none; border-radius:10px;
            padding:9px 16px; font-weight:600; background:#2563eb; color:#fff;
            display:inline-flex; gap:8px; align-items:center; transition:.15s background;
            font-size:.72rem;
        }
        button:hover { background:#1d4ed8; }
        button:disabled { opacity:.55; cursor:not-allowed; }
        button.gray { background:#475569; }
        button.gray:hover { background:#334155; }
        button.outline { background:transparent; border:1px solid #334155; }
        button.outline:hover { background:#334155; }

        table { width:100%; border-collapse:separate; border-spacing:0; font-size:.78rem; background:#162132; border-radius:18px; overflow:hidden; }
        th, td { padding:10px 14px; border-bottom:1px solid #243044; text-align:left; vertical-align:top; }
        th { background:#0f172a; font-size:.58rem; letter-spacing:.07em; text-transform:uppercase; font-weight:600; color:#93a3b8; }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr.changed { background:#1e3a8a66; }
        tbody tr.saving { opacity:.55; }
        tbody tr.error-row { outline:2px solid #dc2626; }

        input[type=text] {
            width:100%; padding:8px 10px; border-radius:8px; border:1px solid #334155;
            background:#0f172a; color:#f1f5f9; font:inherit; font-size:.72rem;
        }
        input[type=text]:focus {
            outline:none; border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.35);
        }
        input[type=range] {
            width:100%; height:6px; background:#334155; border-radius:3px;
            outline:none; cursor:pointer; accent-color:#3b82f6;
        }
        .range-wrap { display:flex; flex-direction:column; gap:6px; }
        .range-label { font-size:.6rem; letter-spacing:.05em; color:#cbd5e1; }

        .checkbox-wrap { display:flex; align-items:center; gap:10px; }
        .checkbox-wrap input { width:18px; height:18px; cursor:pointer; accent-color:#2563eb; }

        .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
        .row-actions button {
            padding:6px 10px; font-size:.6rem; border-radius:8px;
        }
        .row-actions button.secondary { background:#475569; }
        .row-actions button.outline { border:1px solid #334155; background:#1e293b; }
        .row-actions button.outline:hover { background:#334155; }

        .info-line { font-size:.64rem; color:#94a3b8; margin-top:6px; }
        .dirty-badge {
            display:inline-flex; align-items:center; gap:4px;
            background:#f59e0b; color:#1e1e1e; padding:4px 10px 5px;
            border-radius:999px; font-size:.58rem; font-weight:600; letter-spacing:.05em;
        }

        .toast {
            position:fixed; top:20px; right:20px; background:#2563eb;
            padding:10px 16px; border-radius:12px; font-size:.7rem; font-weight:500;
            display:flex; gap:10px; align-items:center; box-shadow:0 4px 18px rgba(0,0,0,.5);
            animation:fadeSlide .25s ease;
        }
        .toast.error { background:#b91c1c; }
        @keyframes fadeSlide { from { opacity:0; transform:translateY(-6px);} to { opacity:1; transform:translateY(0);} }

        .spinner {
            width:14px; height:14px; border:3px solid rgba(255,255,255,.4);
            border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg);} }

        .saving-indicator {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:#1e293b; border:1px solid #334155; padding:8px 16px; border-radius:12px;
            font-size:.68rem; display:flex; gap:10px; align-items:center;
            box-shadow:0 4px 18px rgba(0,0,0,.55);
        }

        .muted { font-size:.65rem; letter-spacing:.04em; color:#94a3b8; }
        .empty { text-align:center; padding:28px 10px; font-size:.75rem; color:#94a3b8; }

        @media (max-width:860px) {
            th:nth-child(3), td:nth-child(3) { display:none; }
        }

        @media (prefers-color-scheme: light) {
            body { background:#f5f7fb; color:#0f172a; }
            header { background:#1e293b; color:#fff; }
            .card { background:#fff; box-shadow:0 4px 18px rgba(0,0,0,.08); }
            table { background:#fff; }
            th { background:#f1f5f9; color:#475569; }
            input[type=text] { background:#fff; color:#0f172a; border-color:#cbd5e1; }
            input[type=text]:focus { box-shadow:0 0 0 2px rgba(59,130,246,.35); }
            tbody tr.changed { background:#ffedd5; }
            .range-label { color:#475569; }
            .toast { background:#2563eb; }
            .toast.error { background:#dc2626; }
            .saving-indicator { background:#fff; border-color:#cbd5e1; }
            .dirty-badge { color:#1e1e1e; }
        }
    </style>
</head>
<body>
<header>
    <h1>Настройки</h1>
    <nav style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="outline" onclick="location.href='/'">Главная</button>
        <button class="outline" onclick="location.href='/profile'">Профиль</button>
        <button class="outline" onclick="location.href='/logs'">Логи</button>
        <button class="outline" onclick="location.href='/admin/users'">Пользователи</button>
        <button class="outline" style="border-color:#dc2626;color:#fff;background:#dc2626;" onclick="location.href='/logout'">Выйти</button>
    </nav>
</header>
<main>
    <section class="card">
        <div class="controls">
            <button id="reloadBtn" class="gray"><span class="btn-text">Обновить</span></button>
            <button id="saveAllBtn" disabled>Сохранить все</button>
            <button id="resetBtn" class="outline" disabled>Сбросить изменения</button>
            <div id="dirtyInfo" style="display:none;" class="dirty-badge" title="Есть несохранённые изменения">
                Изменено: <span id="dirtyCount">0</span>
            </div>
            <div class="muted" id="metaInfo">—</div>
        </div>

        <div class="muted" style="margin-top:-4px;">
            Внесите изменения и нажмите кнопку Сохранить в строке или Сохранить все. Без нажатия изменения не отправляются.
        </div>

        <div style="overflow:auto; max-height:63vh; border-radius:18px; margin-top:14px;">
            <table id="settingsTable" aria-describedby="metaInfo">
                <thead>
                <tr>
                    <th style="width:170px;">Название</th>
                    <th style="width:300px;">Значение</th>
                    <th>Комментарий</th>
                    <th style="width:150px;">Действия</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="emptyState" class="empty" style="display:none;">Нет настроек. Нажмите "Обновить".</div>
        <div class="info-line" id="hintLine"></div>
    </section>
</main>

<div id="savingIndicator" class="saving-indicator" style="display:none;">
    <div class="spinner" style="width:14px;height:14px;border-width:3px;"></div>
    <span>Сохранение...</span>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script src="/settings/script.js" defer></script>
</body>
</html>
