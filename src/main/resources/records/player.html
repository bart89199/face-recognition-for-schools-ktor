<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Просмотр записи</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="preload" href="/records/player.js" as="script">
    <style>
        :root { color-scheme: light dark; font-family: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif; }
        body { margin:0; background:#0f172a; color:#f1f5f9; padding:20px; display:flex; flex-direction:column; gap:18px; min-height:100vh; }
        header { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
        h1 { margin:0; font-size:1rem; }
        .name { font-weight:600; word-break:break-all; }
        video { max-width:100%; width:100%; background:#000; border-radius:14px; outline:2px solid #1e293b; }
        .actions { display:flex; gap:10px; flex-wrap:wrap; }
        a.btn, button.btn { background:#2563eb; color:#fff; padding:10px 16px; border:none; border-radius:8px; font-weight:600; text-decoration:none; cursor:pointer; display:inline-flex; gap:6px; align-items:center; font:inherit; }
        .btn.secondary { background:#475569; }
        .btn:hover { background:#1d4ed8; }
        code { background:#1e293b; padding:2px 6px; border-radius:6px; font-size:.75rem; }
        .meta { font-size:.7rem; opacity:.85; line-height:1.4; word-break:break-all; }
        .error { background:#7f1d1d; color:#fee2e2; padding:10px 12px; border-radius:10px; font-size:.75rem; display:none; }
        .error.show { display:block; }
        @media (prefers-color-scheme: light) {
            body { background:#f5f7fb; color:#0f172a; }
            video { outline:2px solid #cbd5e1; }
            code { background:#e2e8f0; }
            .error { background:#fee2e2; color:#991b1b; }
        }
    </style>
</head>
<body>
<header>
    <h1>Просмотр записи</h1>
</header>
<div id="err" class="error" role="alert"></div>
<div id="content" hidden>
    <div class="name" id="fileName"></div>
    <video id="player" controls preload="metadata"></video>
    <div class="actions">
        <a id="downloadBtn" class="btn" href="#">Скачать</a>
        <a class="btn secondary" href="/api/records">Список (JSON)</a>
    </div>
    <div class="meta" id="meta"></div>
</div>
<script src="/records/player.js" defer></script>
</body>
</html>
