<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Вход</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root { font-family: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif; color-scheme: light dark; }
        body { margin:0; display:flex; min-height:100vh; align-items:center; justify-content:center; background:#f5f7fb; }
        .card { background:#fff; padding:32px 36px 40px; width:100%; max-width:380px; border-radius:18px; box-shadow:0 4px 18px rgba(0,0,0,.07); }
        h1 { margin:0 0 24px; font-size:1.4rem; text-align:center; }
        form { display:flex; flex-direction:column; gap:14px; }
        label { display:flex; flex-direction:column; font-size:.85rem; gap:4px; }
        input { border:1px solid #c9d2e1; border-radius:8px; padding:10px 12px; background:#fff; transition:border-color .15s, box-shadow .15s; font:inherit; }
        input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.25); }
        .remember-inline { display:flex; align-items:center; gap:8px; font-size:.75rem; cursor:pointer; user-select:none; margin-top:4px; }
        .remember-inline input { width:16px; height:16px; margin:0; }
        .actions { display:flex; flex-direction:column; gap:10px; margin-top:4px; }
        button { font:inherit; }
        .btn { cursor:pointer; border:none; border-radius:8px; padding:12px 16px; font-weight:600; background:#2563eb; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .15s; }
        .btn:hover { background:#1d4ed8; }
        .btn:disabled { opacity:.55; cursor:not-allowed; }
        .btn-outline { background:#fff; color:#1f2937; border:1px solid #cbd5e1; }
        .btn-outline:hover { background:#f1f5f9; }
        .error { background:#fee2e2; color:#991b1b; padding:10px 12px; border-radius:8px; font-size:.8rem; line-height:1.2; display:none; }
        .error.show { display:block; }
        @media (prefers-color-scheme: dark) {
            body { background:#0f172a; }
            .card { background:#1e293b; color:#f1f5f9; box-shadow:0 4px 24px rgba(0,0,0,.6); }
            input { background:#0f172a; color:#f1f5f9; border-color:#334155; }
            input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.35); }
            .btn-outline { background:#1e293b; color:#f1f5f9; border-color:#334155; }
            .btn-outline:hover { background:#334155; }
            .error { background:#7f1d1d; color:#fee2e2; }
        }
        .spinner { width:16px; height:16px; border:3px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<main class="card" aria-labelledby="login-title">
    <h1 id="login-title">Вход в систему</h1>

    <div id="error" class="error" role="alert"></div>

    <form id="loginForm" novalidate>
        <label>
            Email
            <input type="email" name="email" id="email" autocomplete="email" required />
        </label>
        <label>
            Пароль
            <input type="password" name="password" id="password" autocomplete="current-password" required minlength="6" />
        </label>

        <label class="remember-inline" title="Хранить сессию до 1 недели">
            <input type="checkbox" id="longLogin" />
            <span>Запомнить меня на неделю (работает и для корп.)</span>
        </label>

        <div class="actions">
            <button id="submitBtn" type="submit" class="btn">
                <span class="btn-text">Войти</span>
            </button>
            <button type="button" id="googleBtn" class="btn btn-outline">
                Войти через корп. почту
            </button>
        </div>
    </form>

</main>

<script src="/login-old/script.js" defer></script>
</body>
</html>
