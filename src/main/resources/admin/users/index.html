<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Управление пользователями</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link rel="preload" href="/admin/users/script.js" as="script">
    <style>
        :root { font-family: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif; color-scheme: light dark; }
        * { box-sizing: border-box; }
        body { margin:0; background:#f5f7fb; color:#0f172a; }
        header { position:sticky; top:0; background:#1e293b; color:#f1f5f9; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:20px; z-index:10; }
        header h1 { margin:0; font-size:1.1rem; font-weight:600; letter-spacing:.5px; }
        .logout-btn { background:#dc2626; color:#fff; border:none; border-radius:8px; padding:8px 16px; font-weight:600; cursor:pointer; font:inherit; display:inline-flex; align-items:center; gap:6px; }
        .logout-btn:hover { background:#b91c1c; }
        main { max-width:1400px; margin:24px auto 60px; padding:0 28px 40px; display:flex; flex-direction:column; gap:28px; }
        .layout { display:grid; gap:28px; grid-template-columns:340px 1fr; align-items:start; }
        @media (max-width:1100px){ .layout { grid-template-columns:1fr; } }
        .panel { background:#fff; padding:20px 22px 26px; border-radius:18px; box-shadow:0 4px 18px rgba(0,0,0,.05); }
        h2 { margin:0 0 14px; font-size:1rem; }
        form { display:flex; flex-direction:column; gap:14px; }
        label { font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; display:flex; flex-direction:column; gap:4px; color:#475569; }
        input[type=text], input[type=email], input[type=password] {
            border:1px solid #cbd5e1; border-radius:8px; padding:9px 11px; font:inherit; background:#fff;
        }
        input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.35); }
        button { font:inherit; border:none; cursor:pointer; border-radius:8px; padding:8px 14px; font-weight:600; background:#2563eb; color:#fff; display:inline-flex; align-items:center; gap:6px; }
        button.secondary { background:#475569; }
        button.danger { background:#dc2626; }
        button.outline { background:#fff; color:#1e293b; border:1px solid #cbd5e1; }
        button.outline:hover { background:#f1f5f9; }
        button:disabled { opacity:.5; cursor:not-allowed; }
        .perm-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:6px 12px; }
        .perm-item { font-size:.63rem; line-height:1.2; display:flex; gap:6px; background:#f1f5f9; padding:6px 8px; border-radius:8px; align-items:flex-start; }
        .actions-inline { display:flex; gap:10px; flex-wrap:wrap; }
        table { width:100%; border-collapse:collapse; background:#fff; border-radius:16px; overflow:hidden; }
        th, td { padding:9px 11px; font-size:.8rem; border-bottom:1px solid #e2e8f0; text-align:left; vertical-align:top; }
        th { background:#f1f5f9; font-weight:600; font-size:.72rem; text-transform:uppercase; letter-spacing:.07em; }
        tbody tr:last-child td { border-bottom:none; }
        .badge { background:#2563eb; color:#fff; padding:2px 6px 3px; border-radius:999px; font-size:.58rem; display:inline-block; }
        .row-actions { display:flex; flex-wrap:wrap; gap:6px; }
        .truncate { max-width:230px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .muted { color:#64748b; font-size:.65rem; letter-spacing:.04em; }
        .error { background:#fee2e2; color:#991b1b; padding:10px 12px; border-radius:10px; font-size:.7rem; display:none; }
        .success { background:#dcfce7; color:#166534; padding:10px 12px; border-radius:10px; font-size:.7rem; display:none; }
        .error.show, .success.show { display:block; }
        .filters { display:flex; flex-direction:column; gap:12px; margin-bottom:18px; }
        .filter-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
        .spinner { width:14px; height:14px; border:3px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .table-wrapper { overflow:auto; max-height:60vh; border-radius:16px; }
        .split-title { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 0 12px; }
        @media (prefers-color-scheme: dark) {
            body { background:#0f172a; color:#f1f5f9; }
            .panel { background:#1e293b; box-shadow:0 4px 22px rgba(0,0,0,.55); }
            input[type=text],input[type=email],input[type=password] { background:#0f172a; border-color:#334155; color:#f1f5f9; }
            .perm-item { background:#334155; }
            table, th, td { background:#1e293b; border-color:#334155; }
            th { background:#0f172a; }
            button.outline { background:#1e293b; color:#f1f5f9; border-color:#334155; }
            button.outline:hover { background:#334155; }
            .error { background:#7f1d1d; color:#fee2e2; }
            .success { background:#14532d; color:#dcfce7; }
        }
    </style>
</head>
<body>
<header>
    <h1>Пользователи</h1>
    <button class="logout-btn" onclick="location.href='/logout'">Выйти</button>
</header>
<main>
    <div id="err" class="error" role="alert"></div>
    <div id="ok" class="success" role="status"></div>

    <div class="layout">
        <!-- Форма -->
        <div class="panel">
            <h2>Создать / обновить</h2>
            <form id="userForm" novalidate>
                <input type="hidden" id="editId"/>

                <label>
                    Имя
                    <input id="name" type="text" required placeholder="Имя пользователя"/>
                </label>
                <label>
                    Email
                    <input id="email" type="email" required placeholder="user@example.com"/>
                </label>
                <label>
                    Пароль
                    <input id="password" type="password" placeholder="Пароль (обязателен при создании)"/>
                </label>

                <div>
                    <div class="muted" style="margin-bottom:6px;">Права доступа</div>
                    <div class="perm-grid" id="permGrid"></div>
                </div>

                <div class="actions-inline">
                    <button type="submit" id="saveBtn">Создать</button>
                    <button type="button" id="resetBtn" class="secondary">Сброс</button>
                </div>
            </form>
        </div>

        <!-- Список -->
        <div class="panel">
            <div class="split-title">
                <h2 style="margin:0;">Список пользователей</h2>
            </div>

            <div class="filters">
                <div class="filter-row">
                    <label style="flex:1; min-width:220px;">
                        Имя
                        <input type="text" id="filterName" placeholder="Имя"/>
                    </label>
                    <button type="button" id="searchNameBtn" class="outline" style="height:38px;">Поиск по имени</button>
                </div>
                <div class="filter-row">
                    <label style="flex:1; min-width:220px;">
                        Email
                        <input type="text" id="filterEmail" placeholder="Email"/>
                    </label>
                    <button type="button" id="searchEmailBtn" class="outline" style="height:38px;">Поиск по email</button>
                </div>
                <div class="filter-row" style="justify-content:flex-start;">
                    <button type="button" id="showAllBtn" class="outline">Показать все</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table id="usersTable">
                    <thead>
                    <tr>
                        <th style="width:60px;">ID</th>
                        <th>Имя</th>
                        <th>Email</th>
                        <th style="min-width:260px;">Права</th>
                        <th style="width:140px;"></th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="muted" id="countInfo" style="margin-top:10px;"></div>
        </div>
    </div>
</main>
<script src="/admin/users/script.js" defer></script>
</body>
</html>
