<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Логи</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link rel="preload" href="/logs/script.js" as="script">
    <style>
        :root { font-family: system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif; color-scheme: light dark; }
        * { box-sizing:border-box; }
        body { margin:0; background:#f5f7fb; color:#0f172a; }
        header {
            position:sticky; top:0; background:#1e293b; color:#f1f5f9;
            padding:14px 22px; display:flex; gap:14px; align-items:center;
            justify-content:space-between; z-index:40;
        }
        h1 { margin:0; font-size:1.05rem; }
        main { max-width:1600px; margin:0 auto 100px; padding:24px 28px 80px; display:flex; flex-direction:column; gap:30px; }

        .tabs { display:flex; gap:6px; flex-wrap:wrap; }
        .tab-btn {
            background:#ffffff; border:1px solid #cbd5e1; padding:9px 16px;
            border-radius:10px; cursor:pointer; font:.72rem/1.2 inherit;
            font-weight:600; letter-spacing:.04em; color:#334155;
            transition:.15s background,.15s color;
        }
        .tab-btn:hover { background:#e2e8f0; }
        .tab-btn.active { background:#2563eb; border-color:#2563eb; color:#fff; }
        .tab-btn[disabled] { opacity:.5; cursor:not-allowed; }

        .panel {
            background:#fff; padding:22px 24px 30px;
            border-radius:22px; box-shadow:0 4px 18px rgba(0,0,0,.07);
        }
        h2 { margin:0 0 18px; font-size:.95rem; }

        form.filters {
            display:flex; flex-wrap:wrap; gap:18px; align-items:flex-end;
            margin:0 0 14px;
        }
        form.filters label.lbl {
            font-size:.58rem; font-weight:600; text-transform:uppercase;
            letter-spacing:.07em; color:#475569; display:flex; flex-direction:column; gap:6px;
        }

        input[type=datetime-local], input[type=text] {
            padding:8px 10px; border:1px solid #cbd5e1; border-radius:10px;
            font:inherit; background:#fff; color:#0f172a; min-width:195px; line-height:1.1;
        }
        input[type=datetime-local]:focus, input[type=text]:focus {
            outline:none; border-color:#3b82f6;
            box-shadow:0 0 0 2px rgba(59,130,246,.35);
        }

        .types-box { display:flex; flex-direction:column; gap:6px; min-width:240px; }
        .types-list {
            display:flex; flex-direction:column; gap:3px;
            max-height:190px; overflow:auto; padding:6px 8px;
            border:1px solid #cbd5e1; border-radius:10px; background:#fff;
        }
        .type-row {
            display:flex; align-items:center; gap:8px;
            font-size:.6rem; line-height:1.15;
            padding:4px 6px; border-radius:6px;
            cursor:pointer; user-select:none;
            transition:.15s background,.15s color;
        }
        .type-row:hover { background:#f1f5f9; }
        .type-row input { margin:0; width:14px; height:14px; accent-color:#2563eb; cursor:pointer; }
        .type-row.checked { background:#2563eb; color:#fff; }
        .type-row.checked:hover { background:#1e54c8; }
        .type-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }

        button {
            font:inherit; cursor:pointer; border:none; border-radius:10px;
            padding:9px 15px; font-weight:600;
            display:inline-flex; gap:6px; align-items:center;
            background:#2563eb; color:#fff;
        }
        button.outline {
            background:#fff; color:#1e293b; border:1px solid #cbd5e1;
        }
        button.outline:hover { background:#f1f5f9; }
        button.secondary { background:#475569; }
        button.danger { background:#dc2626; }
        button:disabled { opacity:.55; cursor:not-allowed; }
        .btn-small { padding:6px 10px; font-size:.62rem; }

        .messages { display:flex; flex-direction:column; gap:10px; }
        .msg { display:none; font-size:.7rem; padding:10px 12px; border-radius:12px; }
        .msg.show { display:block; }
        .msg.error { background:#fee2e2; color:#991b1b; }
        .msg.ok { background:#dcfce7; color:#166534; }

        table {
            width:100%; border-collapse:separate; border-spacing:0;
            background:#fff; border-radius:18px; overflow:hidden; font-size:.7rem;
        }
        th, td { padding:8px 10px; border-bottom:1px solid #e2e8f0; text-align:left; vertical-align:top; }
        th { background:#f1f5f9; font-size:.58rem; letter-spacing:.06em; text-transform:uppercase; }
        tbody tr:last-child td { border-bottom:none; }
        .nowrap { white-space:nowrap; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,"Liberation Mono", monospace; font-size:.68rem; }

        .log-type-badge {
            display:inline-block; padding:2px 7px 3px; border-radius:8px;
            background:#2563eb; color:#fff; font-size:.55rem; margin:0 6px 6px 0;
            letter-spacing:.03em; font-weight:600;
        }

        .counter { font-size:.6rem; color:#475569; margin:4px 0 10px; }
        .spinner { width:16px; height:16px; border:3px solid rgba(255,255,255,.45); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        .sortable { cursor:pointer; display:inline-flex; align-items:center; gap:4px; user-select:none; }
        .sort-ind { font-size:.65em; opacity:.75; }
        .sort-ind.desc::after { content:"▼"; }
        .sort-ind.asc::after { content:"▲"; }

        .hidden { display:none !important; }

        @media (prefers-color-scheme: dark) {
            body { background:#0f172a; color:#f1f5f9; }
            header { background:#0f172a; }
            .panel, table, th, td { background:#1e293b; }
            th { background:#0f172a; }
            button.outline { background:#1e293b; color:#f1f5f9; border-color:#334155; }
            button.outline:hover { background:#334155; }
            .tab-btn { background:#1e293b; border-color:#334155; color:#f1f5f9; }
            .tab-btn:hover { background:#334155; }
            .tab-btn.active { background:#2563eb; border-color:#2563eb; color:#fff; }
            .msg.error { background:#7f1d1d; color:#fee2e2; }
            .msg.ok { background:#14532d; color:#dcfce7; }
            .counter { color:#94a3b8; }
            .types-list { background:#1e293b; border-color:#334155; }
            .type-row:hover { background:#334155; }
            .type-row.checked { background:#2563eb; }
            input[type=datetime-local], input[type=text] {
                background:#1e293b; border-color:#334155; color:#f1f5f9;
            }
            input[type=datetime-local]::-webkit-calendar-picker-indicator {
                filter:invert(1) brightness(1.35) contrast(1.2) saturate(1.4);
                opacity:.9;
            }
            input[type=datetime-local]:hover::-webkit-calendar-picker-indicator {
                filter:invert(1) brightness(1.6) contrast(1.2);
            }
        }
    </style>
</head>
<body>
<header>
    <h1>Логи</h1>
    <nav style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="outline" onclick="location.href='/'">Главная</button>
        <button class="outline" onclick="location.href='/profile'">Профиль</button>
        <button class="outline" onclick="location.href='/admin/users'">Пользователи</button>
        <button class="outline" onclick="location.href='/settings'">Настройки</button>
        <button class="outline" onclick="location.href='/records'">Записи</button>
        <button class="outline" onclick="location.href='/status'">Статус</button>
        <button class="danger" onclick="location.href='/logout'">Выйти</button>
    </nav>
</header>
<main>
    <div class="tabs" id="tabs">
        <button class="tab-btn active" data-tab="systemTab" id="systemTabBtn">System логи</button>
        <button class="tab-btn" data-tab="adminTab" id="adminTabBtn">Admin логи</button>
    </div>

    <div class="messages">
        <div id="errBox" class="msg error" role="alert"></div>
        <div id="okBox" class="msg ok" role="status"></div>
    </div>

    <!-- SYSTEM -->
    <section id="systemTab" class="panel">
        <h2 style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;">
            <span>System логи</span>
            <span id="sysFetchInfo" class="mode-info"></span>
        </h2>
        <form class="filters" autocomplete="off" id="sysFilters">
            <div>
                <label class="lbl" for="sysStart">Начало</label>
                <input type="datetime-local" id="sysStart">
            </div>
            <div>
                <label class="lbl" for="sysEnd">Окончание</label>
                <input type="datetime-local" id="sysEnd">
            </div>
            <div class="types-box">
                <span class="lbl">Типы</span>
                <div class="types-list" id="sysTypesList"></div>
                <div class="type-actions">
                    <button type="button" class="outline btn-small" id="sysSelectAllTypes">Все</button>
                    <button type="button" class="outline btn-small" id="sysClearTypes">Снять</button>
                </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:8px; min-width:150px;">
                <button type="button" id="sysLoadBtn">Обновить</button>
                <button type="button" id="sysCurrentBtn" class="outline">Текущие</button>
                <button type="button" id="sysDownloadBtn" class="outline">Скачать</button>
                <button type="button" id="sysClearBtn" class="outline">Сброс</button>
            </div>
        </form>
        <div class="counter" id="sysCount"></div>
        <div style="overflow:auto; max-height:62vh; border-radius:18px;">
            <table id="sysTable">
                <thead>
                <tr>
                    <th style="width:170px;">
                        <span id="sysTimeHeader" class="sortable" tabindex="0">Время
                            <span class="sort-ind desc" id="sysSortInd"></span>
                        </span>
                    </th>
                    <th style="width:160px;">Тип</th>
                    <th>Сообщение</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- ADMIN -->
    <section id="adminTab" class="panel hidden">
        <h2 style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;">
            <span>Admin логи</span>
            <span id="admFetchInfo" class="mode-info"></span>
        </h2>
        <form class="filters" autocomplete="off" id="admFilters">
            <div>
                <label class="lbl" for="admStart">Начало</label>
                <input type="datetime-local" id="admStart">
            </div>
            <div>
                <label class="lbl" for="admEnd">Окончание</label>
                <input type="datetime-local" id="admEnd">
            </div>
            <div class="types-box">
                <span class="lbl">Типы</span>
                <div class="types-list" id="admTypesList"></div>
                <div class="type-actions">
                    <button type="button" class="outline btn-small" id="admSelectAllTypes">Все</button>
                    <button type="button" class="outline btn-small" id="admClearTypes">Снять</button>
                </div>
            </div>
            <!-- новый фильтр по session id -->
            <div>
                <label class="lbl" for="admSessionFilter">Session ID(ы)</label>
                <input type="text" id="admSessionFilter" placeholder="Напр: 12 или 12,15,20">
            </div>
            <div style="display:flex; flex-direction:column; gap:8px; min-width:150px;">
                <button type="button" id="admLoadBtn">Обновить</button>
                <button type="button" id="admCurrentBtn" class="outline">Текущие</button>
                <button type="button" id="admDownloadBtn" class="outline">Скачать</button>
                <button type="button" id="admClearBtn" class="outline">Сброс</button>
            </div>
        </form>
        <div class="counter" id="admCount"></div>
        <div style="overflow:auto; max-height:62vh; border-radius:18px;">
            <table id="admTable">
                <thead>
                <tr>
                    <th style="width:170px;">
                        <span id="admTimeHeader" class="sortable" tabindex="0">Время
                            <span class="sort-ind desc" id="admSortInd"></span>
                        </span>
                    </th>
                    <th style="width:160px;">
                        <span id="admTypeHeader" class="sortable" tabindex="0">Тип
                            <span class="sort-ind" id="admTypeSortInd"></span>
                        </span>
                    </th>
                    <th style="width:110px;">
                        <span id="admSessionHeader" class="sortable" tabindex="0">Session ID
                            <span class="sort-ind" id="admSessionSortInd"></span>
                        </span>
                    </th>
                    <th>Сообщение</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>
</main>
<script src="/logs/script.js" defer></script>
</body>
</html>
